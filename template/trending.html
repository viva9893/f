<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Leaderboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: #fff;
            padding: 40px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #e50914;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
        }
        thead {
            background-color: #e50914;
        }
        th {
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
            font-size: 16px;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #333;
        }
        tbody tr:hover {
            background-color: #333;
        }
        tbody tr:last-child td {
            border-bottom: none;
        }
        .rank {
            color: #e50914;
            font-weight: bold;
            font-size: 18px;
        }
        a {
            color: #e50914;
            text-decoration: none;
            margin-top: 30px;
            display: inline-block;
            font-weight: bold;
            font-size: 16px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Top Streamed Leaderboard</h1>
        {% if stats %}
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Global Streams</th>
                </tr>
            </thead>
            <tbody>
                {% for row in stats %}
                <tr>
                    <td class="rank">{{ loop.index }}</td>
                    <td>{{ row['title'] }}</td>
                    <td>{{ row['media_type'] }}</td>
                    <td><strong>{{ row['views'] }}</strong> views</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p style="text-align: center; padding: 40px; color: #999;">No trending data available yet.</p>
        {% endif %}
        <br>
        <a href="/">← Back to Dashboard</a>
    </div>
</body>
</html>
