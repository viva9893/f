
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Dashboard</title>
</head>
<body>
    <h1>Netflix Content Catalog</h1>
    <nav>
        <a href="/add"> Add New Show/Anime</a> | 
        <a href="/trending"> View Trending</a>
    </nav
    <hr>

    <h2>Available to Stream</h2>
    {% for item in media_items %}
    <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
        <h3>{{ item['title'] }}</h3>
        <p><strong>Type:</strong> {{ item['media_type'] }}</p>
        <p><strong>By:</strong> {{ item['creator'] }}</p>
        <p><strong>Total Streams:</strong> {{ item['views'] }}</p>

        <form action="/watch" method="POST" style="display: inline;">
            <input type="hidden" name="media_id" value="{{ item['id'] }}">
            <button type="submit" style="background-color: #e50914; color: white; border: none; padding: 5px 10px; cursor: pointer;"> Stream Now</button>
        </form>

        <a href="/delete/{{ item['id'] }}" style="color: red; margin-left: 20px; text-decoration: none;"> Remove Title</a>
    </div>
    {% endfor %}
</body>
</html>
